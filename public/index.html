<body>
<div id="app">
  <div class="loading-screen">

    <svg class="loading-mark" viewBox="0 0 120 120">
      <defs>

          <stop offset="0%" stop-color="#22e5ff"/>
          <stop offset="100%" stop-color="#ff2d95"/>

      <path d="M67 22 L38 64 H54 L48 98 L83 53 H65 L67 22 Z" fill="url(#ngStatic)"/>
    </svg>
    <div class="loading-wordmark"><span>CLASH</span><span class="bet">BET</span></div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    <div class="loading-status">Loading...</div>
  </div>
</div>
<script type="module" src="app.js"></script>
